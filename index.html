<!DOCTYPE html>
<html lang="zh-CN">
<head>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>随机图片</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #000;
        }
        
        #imageContainer {
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        #imageContainer img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            -webkit-user-select: none;
            user-select: none;
        }
        
        #info {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: white;
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            font-size: 14px;
            opacity: 0.7;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
        }
        
        #refreshBtn {
            position: fixed;
            top: 20px;
            right: 20px;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: rgba(255,255,255,0.2);
            border: none;
            color: white;
            font-size: 24px;
            cursor: pointer;
            backdrop-filter: blur(10px);
        }
    </style>
</head>
<body>
    <div id="imageContainer">
        <img id="randomImage" alt="随机图片">
    </div>
    <div id="info">长按图片保存</div>
    <button id="refreshBtn">🔄</button>
    
    <script src="js/images.js"></script>
    <script>
        function loadRandomImage() {
            if (IMAGE_PATHS.length === 0) {
                document.getElementById('randomImage').src = 'data:image/svg+xml,' + encodeURIComponent(`
                    <svg xmlns="http://www.w3.org/2000/svg" width="400" height="300">
                        <rect width="400" height="300" fill="#333"/>
                        <text x="200" y="150" fill="#999" font-family="sans-serif" text-anchor="middle" dominant-baseline="middle">暂无图片</text>
                    </svg>
                `);
                return;
            }
            
            const index = Math.floor(Math.random() * IMAGE_PATHS.length);
            const imgUrl = IMAGE_PATHS[index];
            document.getElementById('randomImage').src = imgUrl;
            document.getElementById('info').textContent = `第 ${index + 1}/${IMAGE_PATHS.length} 张`;
        }
        
        document.getElementById('refreshBtn').addEventListener('click', loadRandomImage);
        
        loadRandomImage();
    </script>
</body>
</html>
