name: Update Image List

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-list:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          persist-credentials: true
        
      - name: Generate image list with Python
        run: |
          python3 << 'EOF'
          import os
          import glob
          
          repo = "Wobum/random-image-api"
          image_files = []
          
          for ext in ["*.jpg", "*.jpeg", "*.JPG", "*.JPEG"]:
              image_files.extend(glob.glob(f"images/{ext}"))
          
          image_files.sort()
          
          with open("js/images.js", "w", encoding="utf-8") as f:
              f.write("// 图片列表 - 由 GitHub Actions 自动生成\n")
              f.write("// 不要手动修改此文件\n\n")
              f.write("const IMAGE_PATHS = [\n")
              
              for i, img in enumerate(image_files):
                  url = f"https://raw.githubusercontent.com/{repo}/main/{img}"
                  if i > 0:
                      f.write(",\n")
                  f.write(f'  "{url}"')
              
              f.write("\n];\n\n")
              f.write("function getRandomImage() {\n")
              f.write("  const index = Math.floor(Math.random() * IMAGE_PATHS.length);\n")
              f.write("  return IMAGE_PATHS[index];\n")
              f.write("}\n\n")
              f.write("function getAllImages() {\n")
              f.write("  return IMAGE_PATHS;\n")
              f.write("}\n\n")
              f.write("function getImageCount() {\n")
              f.write("  return IMAGE_PATHS.length;\n")
              f.write("}\n")
          
          print(f"Found {len(image_files)} images")
          EOF
          
      - name: Commit and push
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add js/images.js
          git diff --staged --quiet || git commit -m "🤖 Update image list"
          git push
